<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Biblioteca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sistema de Biblioteca</h1>

        <!-- SEÇÃO: CADASTRAR NOVO LIVRO -->
        <section class="cadastro-section">
            <h2>Cadastrar Novo Livro</h2>
            <form id="form-livro">
                <div class="form-grupo">
                    <input type="text" id="titulo" placeholder="Título do Livro" required>
                    <input type="text" id="autor" placeholder="Autor" required>
                    <input type="text" id="categoria" placeholder="Categoria" required>
                    <input type="number" id="anoPublicacao" placeholder="Ano de Publicação" required>
                </div>
                <button type="submit" class="btn-primary">Salvar Livro</button>
            </form>
        </section>

        <!-- SEÇÃO: FILTRAR ACERVO -->
        <section class="filter-section">
            <h2>Filtrar Acervo</h2>
            <div class="filtros-grupo">
                <input type="text" id="filtro-titulo" placeholder="Filtrar por Título" oninput="filtrarLivros()">
                <input type="text" id="filtro-autor" placeholder="Filtrar por Autor" oninput="filtrarLivros()">
                <input type="text" id="filtro-categoria" placeholder="Filtrar por Categoria" oninput="filtrarLivros()">
                <input type="number" id="filtro-ano" placeholder="Filtrar por Ano" oninput="filtrarLivros()">
                <button type="button" onclick="limparFiltros()" class="btn-clear">Limpar Filtros</button>
            </div>
        </section>

        <!-- SEÇÃO: LISTAGEM DOS LIVROS -->
        <section class="lista-section">
            <h2>Acervo de Livros</h2>
            <div id="lista-livros">
                <!-- Os livros serão renderizados dinamicamente aqui -->
            </div>
        </section>
    </div>

    <!-- ========================================================================= -->
    <!-- MINI JANELA DE EDIÇÃO (MODAL) - Fica invisível por padrão -->
    <!-- ========================================================================= -->
    <div id="modal-edicao" class="modal-oculto">
        <div class="modal-conteudo">
            <h3>Editar Livro</h3>
            <form id="form-editar">
                <div class="modal-inputs">
                    <label for="edit-titulo">Título:</label>
                    <input type="text" id="edit-titulo" required>
                    
                    <label for="edit-autor">Autor:</label>
                    <input type="text" id="edit-autor" required>
                    
                    <label for="edit-categoria">Categoria:</label>
                    <input type="text" id="edit-categoria" required>
                    
                    <label for="edit-ano">Ano de Publicação:</label>
                    <input type="number" id="edit-ano" required>
                </div>
                
                <div class="modal-acoes">
                    <button type="submit" class="btn-salvar-modal">Salvar Alterações</button>
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
